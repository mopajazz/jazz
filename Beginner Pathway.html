<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beginner Pathway — Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,500;0,600;1,600&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background:
        radial-gradient(1200px 600px at 30% -10%, #efe7d8 0%, transparent 60%),
        #e7ddcc;
      color: #221d16;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      padding: 22px 34px; flex-wrap: wrap;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .badge {
      width: 34px; height: 34px; border-radius: 9px; background: #221d16; color: #f5f0e8;
      display: grid; place-items: center; font-family: "Spectral", serif; font-style: italic; font-weight: 700; font-size: 15px;
    }
    .topbar h1 { font-family: "Spectral", serif; font-weight: 600; font-size: 19px; letter-spacing: -.01em; }
    .topbar h1 em { color: #b1481e; }
    .topbar .sub { font-size: 13px; color: #6b6356; margin-top: 1px; }
    .legend { display: flex; align-items: center; gap: 18px; font-size: 13px; color: #6b6356; }
    .legend b { color: #221d16; font-weight: 600; }
    .legend .pill { display: inline-flex; align-items: center; gap: 7px; background: #fbf8f2; border: 1px solid #e4dbca; padding: 7px 13px; border-radius: 100px; }
    .legend .dot { width: 8px; height: 8px; border-radius: 50%; background: #2f6f62; }

    .stage-wrap { width: 100%; display: flex; justify-content: center; padding: 8px 24px 60px; }
    .stage {
      display: flex; align-items: flex-start; gap: 46px;
      transform-origin: top center;
    }

    .frame-col { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .frame-label { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: #6b6356; }
    .frame-label .d { width: 7px; height: 7px; border-radius: 2px; background: #b1481e; }

    /* Desktop browser chrome */
    .browser {
      width: 1180px; height: 760px; background: #fbf8f2; border-radius: 16px;
      box-shadow: 0 2px 8px rgba(40,30,15,.08), 0 40px 80px -30px rgba(50,38,18,.5);
      overflow: hidden; border: 1px solid #d6cab2; display: flex; flex-direction: column;
    }
    .browser-bar { height: 46px; background: #ece4d6; border-bottom: 1px solid #ddd2bd; display: flex; align-items: center; gap: 14px; padding: 0 16px; flex-shrink: 0; }
    .lights { display: flex; gap: 8px; }
    .lights span { width: 12px; height: 12px; border-radius: 50%; }
    .lights .r { background: #e0654f; } .lights .y { background: #e4b343; } .lights .g { background: #5bb95b; }
    .urlbar { flex: 1; height: 28px; background: #fbf8f2; border: 1px solid #ddd2bd; border-radius: 8px; display: flex; align-items: center; gap: 8px; padding: 0 12px; font-family: "DM Mono", monospace; font-size: 12.5px; color: #6b6356; }
    .urlbar .lock { width: 11px; height: 11px; border-radius: 2px; border: 1.5px solid #9a9081; border-top-left-radius: 4px; border-top-right-radius: 4px; }
    .browser iframe { flex: 1; width: 100%; border: none; background: #f5f0e8; }

    /* Phone bezel */
    .phone {
      width: 392px; height: 800px; background: #1b1712; border-radius: 52px; padding: 13px;
      box-shadow: 0 2px 8px rgba(40,30,15,.08), 0 40px 80px -30px rgba(50,38,18,.55);
      position: relative;
    }
    .phone-screen { width: 100%; height: 100%; border-radius: 40px; overflow: hidden; background: #f5f0e8; position: relative; }
    .phone-notch { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 116px; height: 30px; background: #1b1712; border-radius: 100px; z-index: 5; }
    .phone iframe { width: 100%; height: 100%; border: none; background: #f5f0e8; }

    .hint { text-align: center; font-size: 12.5px; color: #8c8475; margin-top: 2px; }

    @media (max-width: 820px) {
      .topbar { padding: 18px; }
      .legend { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="badge">JI</span>
      <div>
        <h1>Beginner Pathway <em>·</em> Prototype</h1>
        <div class="sub">Foundations of the Jazz Language — hi-fi clickable prototype</div>
      </div>
    </div>
    <div class="legend">
      <span class="pill"><span class="dot"></span> Both frames are <b>live &amp; clickable</b></span>
      <span>Audio · tempo · tabs · mark-complete all work</span>
    </div>
  </header>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <div class="frame-col" style="line-height: 1.5">
        <span class="frame-label"><span class="d"></span> Desktop</span>
        <div class="browser">
          <div class="browser-bar">
            <div class="lights"><span class="r"></span><span class="y"></span><span class="g"></span></div>
            <div class="urlbar"><span class="lock"></span> jazzinteractive.org/beginner-pathway</div>
          </div>
          <iframe src="Beginner Pathway App.html" title="Desktop preview"></iframe>
        </div>
      </div>

      <div class="frame-col">
        <span class="frame-label"><span class="d"></span> Mobile</span>
        <div class="phone">
          <div class="phone-screen">
            <div class="phone-notch"></div>
            <iframe src="Beginner Pathway App.html" title="Mobile preview"></iframe>
          </div>
        </div>
        <span class="hint">Adult learners practicing on the go</span>
      </div>
    </div>
  </div>

  <script>
    // Scale the stage down to fit narrow viewports (never up).
    function fit() {
      const stage = document.getElementById('stage');
      stage.style.transform = 'scale(1)';
      const natural = stage.scrollWidth;
      const avail = window.innerWidth - 48;
      const s = Math.min(1, avail / natural);
      stage.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    window.addEventListener('load', fit);
    fit();
  </script>
</body>
</html>
